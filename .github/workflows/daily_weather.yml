name: Daily Marine Weather Card

on:
  # Runs every 6 hours starting at 6:30 AM AST (Puerto Rico is UTC-4, no DST)
  # 6:30 AM AST  = 10:30 UTC
  # 12:30 PM AST = 16:30 UTC
  # 6:30 PM AST  = 22:30 UTC
  # 12:30 AM AST = 04:30 UTC
  schedule:
    - cron: "30 9,15,21,4 * * *"

  # Allow manual run from the Actions tab at any time
  workflow_dispatch:

jobs:
  generate-card:
    runs-on: ubuntu-22.04          # pin to 22.04 — wkhtmltopdf package is stable here
    timeout-minutes: 15

    permissions:
      contents: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install wkhtmltopdf (full patched Qt build)
        run: |
          # The apt package on ubuntu-22.04 is a reduced build that renders blank images.
          # Install the full patched-qt build from the official wkhtmltopdf release.
          wget -q https://github.com/wkhtmltopdf/packaging/releases/download/0.12.6.1-3/wkhtmltox_0.12.6.1-3.jammy_amd64.deb
          sudo apt-get install -y -qq ./wkhtmltox_0.12.6.1-3.jammy_amd64.deb
          wkhtmltoimage --version

      - name: Install Python packages
        run: pip install --quiet Pillow requests

      - name: Create output folder
        run: mkdir -p output

      - name: Generate marine weather card
        run: python scripts/generate_card.py
        env:
          OUTPUT_DIR: ${{ github.workspace }}/output

      - name: Verify image was created
        run: |
          ls -lh output/marine_forecast.jpg
          echo "Image size: $(wc -c < output/marine_forecast.jpg) bytes"

      - name: Upload image as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: marine-weather-${{ github.run_id }}
          path: output/marine_forecast.jpg
          retention-days: 30

      - name: Commit image to repository
        run: |
          git config user.name  "Rabirubia Weather Bot"
          git config user.email "bot@rabirubiaweather.com"
          git add output/marine_forecast.jpg
          git diff --staged --quiet && echo "No changes to commit" || \
            git commit -m "Marine weather card $(date +'%Y-%m-%d %H:%M UTC')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
